# Fizzy Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=fizzy
APP_SUBDOMAIN=fizzy
APP_ACCESS=public

# SSO: Fizzy has no OIDC/OAuth2/SSO support — passwordless only (magic links + passkeys).
# No Authentik integration possible without forking.
APP_SSO=false

APP_DESCRIPTION="Kanban issue and idea tracker"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Empty → Docker named volume (easy try-out, no path decision needed).
# Set a path → bind mount (host-visible, rsync/snapshot-friendly for backups).
# The host directory must exist before deploy: mkdir -p <path>
# Example: FIZZY_DATA=/opt/sixnet/apps/fizzy/data
FIZZY_DATA=

# =============================================================================
# SMTP (required for magic link login — without it, codes appear in docker logs)
# =============================================================================
FIZZY_SMTP_ADDRESS=
FIZZY_SMTP_PORT=587
FIZZY_SMTP_USERNAME=
FIZZY_SMTP_DOMAIN=
FIZZY_SMTP_AUTHENTICATION=plain
FIZZY_MAILER_FROM=
