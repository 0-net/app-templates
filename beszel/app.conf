# Beszel Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=beszel
APP_SUBDOMAIN=beszel
APP_ACCESS=vpn

# SSO: Authentik OAuth2 provider will be created automatically.
# Beszel uses PocketBase as its auth backend. The callback path is the
# standard PocketBase OAuth2 redirect: /api/oauth2-redirect
APP_SSO=true
APP_SSO_REDIRECT_URI=https://beszel.${DOMAIN}/api/oauth2-redirect

APP_DESCRIPTION="Server monitoring with OIDC SSO via Authentik"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Path to Beszel data directory on Docker host (bind mount).
# Contains the PocketBase database, SSH keys, and configuration.
# Leave empty to use a Docker named volume (default).
# Example: BESZEL_DATA=/share/fast/sixnet/beszel
BESZEL_DATA=

# =============================================================================
# SMART monitoring (customize per deployment)
# =============================================================================
# Comma-separated block devices to expose to the agent for SMART monitoring.
# Leave empty to disable SMART. List only the base devices, not partitions.
# Example: BESZEL_SMART_DRIVES=/dev/sda,/dev/sdb,/dev/nvme0
BESZEL_SMART_DRIVES=

# =============================================================================
# Authentication
# =============================================================================
# Set to true to disable password login and force SSO-only.
# Keep false until SSO is confirmed working (fallback admin access).
BESZEL_DISABLE_PASSWORD_AUTH=false
