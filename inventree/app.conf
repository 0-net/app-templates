# InvenTree Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=inventree
APP_SUBDOMAIN=inventory
APP_ACCESS=vpn

# SSO: Authentik OAuth2 provider will be created automatically.
# The callback path is /accounts/{provider_id}/login/callback/ (allauth 65.x, no /oidc/ segment).
APP_SSO=true
APP_SSO_REDIRECT_URI=https://inventory.${DOMAIN}/accounts/authentik/login/callback/

# Internal service (for Caddy reverse proxy)
# Caddy reaches inventree-proxy over the sixnet network.
# Description
APP_DESCRIPTION="Inventory management with OIDC SSO via Authentik"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Path to InvenTree data directory on Docker host (bind mount).
# Contains database files, media uploads, static files, secret_key.txt.
# Leave empty to use a Docker named volume (default).
# Example: INVENTREE_DATA=/share/fast/sixnet/inventree
INVENTREE_DATA=

# =============================================================================
# Initial Admin Account (set before first deploy)
# =============================================================================
# InvenTree creates a superuser on first run if these are set.
# Required before first deploy — leave empty and InvenTree won't create an admin.
INVENTREE_ADMIN_EMAIL=
INVENTREE_ADMIN_USER=admin
INVENTREE_ADMIN_PASSWORD=
