# Twenty Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=twenty
APP_SUBDOMAIN=crm
APP_ACCESS=public

# SSO: Twenty's generic OIDC SSO requires an enterprise key (not free).
# Start with password auth, enable SSO later if/when needed.
# See README.md for the transition steps.
APP_SSO=false

APP_DESCRIPTION="Open-source CRM"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Bind mount paths for persistent data. Leave empty for Docker named volumes.
# Example: TWENTY_DB_DATA=/share/fast/sixnet/twenty/db
TWENTY_DB_DATA=
# Example: TWENTY_SERVER_DATA=/share/fast/sixnet/twenty/server
TWENTY_SERVER_DATA=

# =============================================================================
# Auth
# =============================================================================
# Keep password auth enabled until SSO is configured and tested.
# Set to false to force SSO-only (after SSO is confirmed working).
TWENTY_AUTH_PASSWORD_ENABLED=true

# =============================================================================
# SMTP (optional — needed for invitations and email verification)
# =============================================================================
# Set TWENTY_EMAIL_DRIVER=smtp and fill in the vars below to enable email.
# Default is "logger" (logs emails to stdout, no actual sending).
TWENTY_EMAIL_DRIVER=logger
TWENTY_SMTP_HOST=
TWENTY_SMTP_PORT=587
TWENTY_SMTP_USER=
TWENTY_EMAIL_FROM=
