# Docmost Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=docmost
APP_SUBDOMAIN=docmost
APP_ACCESS=public

# SSO: Docmost OIDC SSO requires an Enterprise license (not free).
# Start with password auth; add license key later to unlock OIDC → Authentik.
# See README.md for the transition steps.
APP_SSO=false

APP_DESCRIPTION="Collaborative wiki and docs"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Empty → Docker named volume (easy try-out, no path decision needed).
# Set a path → bind mount (host-visible, rsync/snapshot-friendly for backups).
# The host directory must exist before deploy: mkdir -p <path>
# Example: DOCMOST_DATA=/opt/sixnet/apps/docmost/data
DOCMOST_DATA=
# Example: DOCMOST_DB_DATA=/opt/sixnet/apps/docmost/db
DOCMOST_DB_DATA=

# =============================================================================
# SMTP (needed for invitations and password resets)
# =============================================================================
DOCMOST_MAIL_DRIVER=smtp
DOCMOST_SMTP_HOST=
DOCMOST_SMTP_PORT=587
DOCMOST_SMTP_USERNAME=
DOCMOST_MAIL_FROM=
DOCMOST_MAIL_FROM_NAME=Docmost
