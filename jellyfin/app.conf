# Jellyfin Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=jellyfin
APP_SUBDOMAIN=media
APP_ACCESS=vpn

# SSO: Authentik OAuth2 provider will be created automatically.
# The redirect URI is Jellyfin-specific (SSO plugin provider name must match the
# last path segment — "authentik" — exactly, including case).
APP_SSO=true
APP_SSO_REDIRECT_URI=https://media.${DOMAIN}/sso/OID/redirect/authentik

# Internal service (for Caddy reverse proxy)
# Container name on sixnet network
# Description
APP_DESCRIPTION="Media server with SSO support via OIDC plugin"

# =============================================================================
# Media Library Paths (customize per deployment)
# =============================================================================
# Paths to media on the Docker host, mounted read-only into container
# Set to /dev/null to disable unused paths
MEDIA_PATH_1=/dev/null
MEDIA_PATH_2=/dev/null
MEDIA_PATH_3=/dev/null

# =============================================================================
# Storage Paths (customize per deployment)
# =============================================================================
# Jellyfin config and cache - use fast storage if available
# Leave empty to use Docker volumes (default)
JELLYFIN_CONFIG=
JELLYFIN_CACHE=
