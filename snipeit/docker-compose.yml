services:
  snipeit:
    image: snipe/snipe-it:v8-latest
    container_name: snipeit
    restart: unless-stopped
    depends_on:
      snipeit-db:
        condition: service_healthy
    networks:
      - sixnet
      - snipeit-net
    volumes:
      - ${SNIPEIT_DATA:-snipeit-data}:/var/lib/snipeit
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${SNIPEIT_APP_KEY}"
      APP_URL: "https://${APP_SUBDOMAIN}.${DOMAIN}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Europe/Berlin}"
      APP_LOCALE: "${APP_LOCALE:-en-US}"
      APP_TRUSTED_PROXIES: "172.0.0.0/8"
      APP_FORCE_TLS: "true"
      SECURE_COOKIES: "true"

      DB_HOST: snipeit-db
      DB_PORT: "3306"
      DB_DATABASE: snipeit
      DB_USERNAME: snipeit
      DB_PASSWORD: "${SNIPEIT_DB_PASSWORD}"
      DB_CHARSET: utf8mb4

      MAIL_DRIVER: "${SNIPEIT_MAIL_DRIVER:-log}"
      MAIL_HOST: "${SNIPEIT_MAIL_HOST:-}"
      MAIL_PORT: "${SNIPEIT_MAIL_PORT:-587}"
      MAIL_USERNAME: "${SNIPEIT_MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${SNIPEIT_MAIL_PASSWORD:-}"
      MAIL_FROM_ADDR: "${SNIPEIT_MAIL_FROM_ADDR:-}"
      MAIL_FROM_NAME: "${SNIPEIT_MAIL_FROM_NAME:-Snipe-IT}"

  snipeit-db:
    image: mariadb:11
    container_name: snipeit-db
    restart: unless-stopped
    networks:
      - snipeit-net
    volumes:
      - ${SNIPEIT_DB_DATA:-snipeit-db-data}:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: "${SNIPEIT_DB_PASSWORD}"
      MARIADB_DATABASE: snipeit
      MARIADB_USER: snipeit
      MARIADB_PASSWORD: "${SNIPEIT_DB_PASSWORD}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  sixnet:
    external: true
  snipeit-net:
    internal: true

volumes:
  snipeit-data:
  snipeit-db-data:
