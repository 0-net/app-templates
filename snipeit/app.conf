# Snipe-IT Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=snipeit
APP_SUBDOMAIN=assets
APP_ACCESS=vpn

# SSO: Snipe-IT open-source supports SAML 2.0 only — not OIDC.
# SAML setup also requires Authentik's LDAP outpost for user sync.
# Start without SSO; see README.md for the SAML + LDAP transition path.
APP_SSO=false

APP_DESCRIPTION="IT asset management"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Empty → Docker named volume (easy try-out, no path decision needed).
# Set a path → bind mount (host-visible, rsync/snapshot-friendly for backups).
# The host directory must exist before deploy: mkdir -p <path>
# Example: SNIPEIT_DATA=/share/fast/sixnet/snipeit/data
SNIPEIT_DATA=
# Example: SNIPEIT_DB_DATA=/share/fast/sixnet/snipeit/db
SNIPEIT_DB_DATA=

# =============================================================================
# Application
# =============================================================================
APP_TIMEZONE=Europe/Berlin
APP_LOCALE=en-US

# =============================================================================
# SMTP (needed for password resets, asset notifications, and audit alerts)
# =============================================================================
SNIPEIT_MAIL_DRIVER=smtp
SNIPEIT_MAIL_HOST=
SNIPEIT_MAIL_PORT=587
SNIPEIT_MAIL_USERNAME=
SNIPEIT_MAIL_FROM_ADDR=
SNIPEIT_MAIL_FROM_NAME=Snipe-IT
