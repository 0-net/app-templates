# Umami Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=umami
APP_SUBDOMAIN=umami
APP_ACCESS=public

# SSO: No OIDC support in the open-source edition (in progress, not yet merged).
APP_SSO=false

APP_DESCRIPTION="Privacy-focused web analytics"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Empty → Docker named volume (easy try-out, no path decision needed).
# Set a path → bind mount (host-visible, rsync/snapshot-friendly for backups).
# The host directory must exist before deploy: mkdir -p <path>
# Note: the Umami app itself is stateless — only the DB needs persistence.
# Example: UMAMI_DB_DATA=/opt/sixnet/apps/umami/db
UMAMI_DB_DATA=

# =============================================================================
# Tracker (optional — rename to bypass ad blockers)
# =============================================================================
# UMAMI_TRACKER_SCRIPT_NAME=analytics.js
# UMAMI_COLLECT_API_ENDPOINT=/api/collect
