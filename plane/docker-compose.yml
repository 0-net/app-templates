# Plane — Project Management
# https://plane.so / https://developers.plane.so/self-hosting
#
# Architecture:
#   db         — PostgreSQL (plane-net only)
#   redis      — Valkey/Redis (plane-net only)
#   mq         — RabbitMQ (plane-net only)
#   minio      — MinIO object storage (plane-net only)
#   api        — Django API backend (plane-net only)
#   worker     — Background task worker (plane-net only)
#   beat       — Scheduled task worker (plane-net only)
#   migrator   — DB migrations, runs once on startup (plane-net only)
#   live       — Real-time collaboration (plane-net only)
#   web        — Frontend (plane-net only)
#   space      — Public spaces frontend (plane-net only)
#   admin      — Admin (god-mode) frontend (plane-net only)
#   plane-proxy — Caddy entry point (sixnet + plane-net)
#
# Internal service names match Plane's defaults so plane-proxy's Caddyfile
# resolves upstreams (web, api, space, admin, live) without aliases.
# plane-proxy keeps its prefixed name as it's visible on sixnet.
#
# Traffic flow:
#   sixnet Caddy (TLS) → plane-proxy:80 → web:3000 / api:8000 / ...
#
# Plane's proxy handles all internal routing (/api/*, /spaces/*, /god-mode/*, etc.)
# SITE_ADDRESS=:80 disables Plane's own TLS — outer Caddy handles it.

networks:
  sixnet:
    external: true
    name: ${DOCKER_NETWORK_NAME:-sixnet}
  plane-net:
    internal: true

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  uploads:
  logs_api:
  logs_worker:
  logs_beat:
  logs_migrator:
  proxy_config:
  proxy_data:

# ---------------------------------------------------------------------------
# Shared environment variable groups (YAML anchors)
# ---------------------------------------------------------------------------
x-db-env: &db-env
  POSTGRES_USER: plane
  POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
  POSTGRES_DB: plane
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  PGHOST: db
  PGDATABASE: plane
  PGDATA: /var/lib/postgresql/data

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis:6379/"

x-mq-env: &mq-env
  RABBITMQ_HOST: mq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: plane
  RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
  RABBITMQ_VHOST: plane
  AMQP_URL: "amqp://plane:${PLANE_RABBITMQ_PASSWORD}@mq:5672/plane"

x-s3-env: &s3-env
  AWS_REGION: ""
  AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_SECRET_KEY}
  AWS_S3_ENDPOINT_URL: "http://minio:9000"
  AWS_S3_BUCKET_NAME: uploads
  USE_MINIO: "1"
  MINIO_ENDPOINT_SSL: "0"

x-app-env: &app-env
  SECRET_KEY: ${PLANE_SECRET_KEY}
  LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SECRET_KEY}
  WEB_URL: "https://${APP_SUBDOMAIN:-plane}.${DOMAIN}"
  CORS_ALLOWED_ORIGINS: "https://${APP_SUBDOMAIN:-plane}.${DOMAIN}"
  DATABASE_URL: "postgresql://plane:${PLANE_DB_PASSWORD}@db/plane"
  DEBUG: "0"
  GUNICORN_WORKERS: "2"
  API_KEY_RATE_LIMIT: "60/minute"
  TRUSTED_PROXIES: "0.0.0.0/0"
  SITE_ADDRESS: ":80"

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15.7-alpine
    container_name: plane-db
    restart: unless-stopped
    command: postgres -c 'max_connections=1000'
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - plane-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - plane-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: plane
      RABBITMQ_DEFAULT_PASS: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: plane
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - plane-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: plane-minio
    restart: unless-stopped
    command: server /export --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${PLANE_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${PLANE_MINIO_SECRET_KEY}
    volumes:
      - uploads:/export
    networks:
      - plane-net

  # ---------------------------------------------------------------------------
  # Application (migrations run first, then services start)
  # ---------------------------------------------------------------------------
  migrator:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-stable}
    container_name: plane-migrator
    restart: on-failure
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      <<: [*app-env, *db-env, *redis-env, *mq-env, *s3-env]
    volumes:
      - logs_migrator:/code/plane/logs
    networks:
      - plane-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-stable}
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    environment:
      <<: [*app-env, *db-env, *redis-env, *mq-env, *s3-env]
    volumes:
      - logs_api:/code/plane/logs
    networks:
      - plane-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-stable}
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      <<: [*app-env, *db-env, *redis-env, *mq-env, *s3-env]
    volumes:
      - logs_worker:/code/plane/logs
    networks:
      - plane-net
    depends_on:
      - api

  beat:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-stable}
    container_name: plane-beat
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      <<: [*app-env, *db-env, *redis-env, *mq-env, *s3-env]
    volumes:
      - logs_beat:/code/plane/logs
    networks:
      - plane-net
    depends_on:
      - api

  live:
    image: artifacts.plane.so/makeplane/plane-live:${APP_RELEASE:-stable}
    container_name: plane-live
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://api:8000"
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SECRET_KEY}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: "redis://redis:6379/"
    networks:
      - plane-net
    depends_on:
      - api

  web:
    image: artifacts.plane.so/makeplane/plane-frontend:${APP_RELEASE:-stable}
    container_name: plane-web
    restart: unless-stopped
    networks:
      - plane-net
    depends_on:
      - api

  space:
    image: artifacts.plane.so/makeplane/plane-space:${APP_RELEASE:-stable}
    container_name: plane-space
    restart: unless-stopped
    networks:
      - plane-net
    depends_on:
      - api

  admin:
    image: artifacts.plane.so/makeplane/plane-admin:${APP_RELEASE:-stable}
    container_name: plane-admin
    restart: unless-stopped
    networks:
      - plane-net
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Proxy — entry point for outer Caddy (sixnet + plane-net)
  # SITE_ADDRESS=:80 disables Plane's own TLS; outer Caddy handles it.
  # TRUSTED_PROXIES allows X-Forwarded-* headers from outer Caddy.
  # ---------------------------------------------------------------------------
  plane-proxy:
    image: artifacts.plane.so/makeplane/plane-proxy:${APP_RELEASE:-stable}
    container_name: plane-proxy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_SUBDOMAIN:-plane}.${DOMAIN}
      FILE_SIZE_LIMIT: "5242880"
      BUCKET_NAME: uploads
      SITE_ADDRESS: ":80"
      TRUSTED_PROXIES: "0.0.0.0/0"
    volumes:
      - proxy_config:/config
      - proxy_data:/data
    networks:
      - sixnet
      - plane-net
    depends_on:
      - web
      - api
      - space
      - admin
      - live
