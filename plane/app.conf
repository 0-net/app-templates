# Plane Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=plane
APP_SUBDOMAIN=plane
APP_ACCESS=public

# SSO: Authentik OIDC provider created automatically by init-app.
# Callback URL: verify from Plane god-mode (/god-mode/settings/integrations/oidc/)
# after first deploy, then update Authentik provider if different.
APP_SSO=true
APP_SSO_REDIRECT_URI=https://plane.${DOMAIN}/auth/oidc-callback/

# Description
APP_DESCRIPTION="Project management and collaboration"

# =============================================================================
# Plane release
# =============================================================================
# Docker image tag. "stable" tracks the latest stable release.
# Pin to a specific version (e.g. v0.23.0) for reproducible deployments.
APP_RELEASE=stable
