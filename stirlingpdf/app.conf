# Stirling-PDF Application Metadata
# Used by sixnet deploy tooling

# App identity
APP_NAME=stirlingpdf
APP_SUBDOMAIN=pdf
APP_ACCESS=public

# SSO: Stirling-PDF supports OIDC via Authentik in the free tier.
APP_SSO=true
APP_SSO_REDIRECT_URI=https://pdf.${DOMAIN}/login/oauth2/code/authentik

APP_DESCRIPTION="PDF tools suite"

# =============================================================================
# Storage (customize per deployment)
# =============================================================================
# Empty → Docker named volume (easy try-out, no path decision needed).
# Set a path → bind mount (host-visible, rsync/snapshot-friendly for backups).
# The host directory must exist before deploy: mkdir -p <path>
# STIRLINGPDF_CONFIGS holds settings.yml + embedded H2 database — back this up.
# Example: STIRLINGPDF_CONFIGS=/opt/sixnet/apps/stirlingpdf/configs
STIRLINGPDF_CONFIGS=
# Example: STIRLINGPDF_LOGS=/opt/sixnet/apps/stirlingpdf/logs
STIRLINGPDF_LOGS=

# =============================================================================
# Application
# =============================================================================
# Login method: 'all' (password + SSO), 'normal' (password only), 'oauth2' (SSO only)
# Use 'all' during initial setup, switch to 'oauth2' once SSO is confirmed working.
STIRLINGPDF_LOGIN_METHOD=all

# Initial admin credentials — only effective on first run (before H2 DB is created).
# Change via the UI after first login.
STIRLINGPDF_ADMIN_USERNAME=admin
STIRLINGPDF_ADMIN_PASSWORD=
